name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start LanTransfer.exe
        2. Scan QR code
        3. Upload file
        4. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Windows version, browser, phone model, network type
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste terminal output or add screenshots if useful.
