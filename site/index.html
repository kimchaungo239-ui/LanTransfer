<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LanTransfer - Windows 与手机局域网互传文件</title>
  <meta name="description" content="LanTransfer 是一个 Windows 与手机之间局域网互传文件的小工具，不用登录、不走云端、不插数据线。">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#top" aria-label="LanTransfer 首页">
      <span class="brand-mark">LT</span>
      <span>LanTransfer</span>
    </a>
    <nav class="nav" aria-label="页面导航">
      <a href="#steps" data-i18n="site.navSteps"></a>
      <a href="#security" data-i18n="site.navSecurity"></a>
      <a href="#faq" data-i18n="site.navFaq"></a>
    </nav>
    <div id="preferences" class="preferences"></div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow" data-i18n="site.eyebrow"></p>
        <h1 data-i18n="site.heroTitle"></h1>
        <p class="lead" data-i18n="site.heroText"></p>
        <div class="hero-actions">
          <a class="download-button" href="downloads/LanTransfer-Windows.zip" download data-i18n="site.download"></a>
          <span class="release-note" data-i18n="site.releaseNote"></span>
        </div>
      </div>
      <div class="device-preview" aria-label="LanTransfer 工具预览">
        <div class="preview-card">
          <div class="preview-top">
            <strong>LanTransfer</strong>
            <span>Local first</span>
          </div>
          <div class="preview-main">
            <div>
              <p class="mini-label" data-i18n="site.previewComputer"></p>
              <h2 data-i18n="site.previewTitle"></h2>
              <p data-i18n="site.previewNetwork"></p>
              <div class="mini-actions">
                <span data-i18n="site.previewRefresh"></span>
                <span data-i18n="site.previewCopy"></span>
              </div>
            </div>
            <div class="phone-frame">
              <div class="phone-speaker"></div>
              <div class="phone-line wide"></div>
              <div class="phone-line"></div>
              <div class="phone-success" data-i18n="site.previewUpload"></div>
            </div>
          </div>
          <div class="ocean-strip">
            <strong data-i18n="site.previewCollect"></strong>
            <span data-i18n="site.previewCollectText"></span>
          </div>
        </div>
      </div>
    </section>

    <section id="steps" class="section">
      <div class="section-heading">
        <p class="eyebrow" data-i18n="site.stepsEyebrow"></p>
        <h2 data-i18n="site.stepsTitle"></h2>
      </div>
      <div class="steps">
        <article>
          <span class="step-index">1</span>
          <h3 data-i18n="site.step1Title"></h3>
          <p data-i18n="site.step1Text"></p>
        </article>
        <article>
          <span class="step-index">2</span>
          <h3 data-i18n="site.step2Title"></h3>
          <p data-i18n="site.step2Text"></p>
        </article>
        <article>
          <span class="step-index">3</span>
          <h3 data-i18n="site.step3Title"></h3>
          <p data-i18n="site.step3Text"></p>
        </article>
      </div>
    </section>

    <section id="security" class="section split">
      <div>
        <p class="eyebrow" data-i18n="site.securityEyebrow"></p>
        <h2 data-i18n="site.securityTitle"></h2>
      </div>
      <div class="security-list">
        <p><strong data-i18n="site.securityLogin"></strong><span data-i18n="site.securityLoginText"></span></p>
        <p><strong data-i18n="site.securityCloud"></strong><span data-i18n="site.securityCloudText"></span></p>
        <p><strong data-i18n="site.securityQr"></strong><span data-i18n="site.securityQrText"></span></p>
        <p><strong data-i18n="site.securityMulti"></strong><span data-i18n="site.securityMultiText"></span></p>
      </div>
    </section>

    <section id="faq" class="section faq">
      <div class="section-heading">
        <p class="eyebrow">FAQ</p>
        <h2 data-i18n="site.faqTitle"></h2>
      </div>
      <details open>
        <summary data-i18n="site.faqNetworkQ"></summary>
        <p data-i18n="site.faqNetworkA"></p>
      </details>
      <details>
        <summary data-i18n="site.faqSizeQ"></summary>
        <p data-i18n="site.faqSizeA"></p>
      </details>
      <details>
        <summary data-i18n="site.faqExeQ"></summary>
        <p data-i18n="site.faqExeA"></p>
      </details>
      <details>
        <summary data-i18n="site.faqWebQ"></summary>
        <p data-i18n="site.faqWebA"></p>
      </details>
    </section>
  </main>

  <footer class="footer">
    <span>LanTransfer</span>
    <span>Local network file transfer for Windows and phones.</span>
  </footer>
  <script src="site.js"></script>
</body>
</html>
